<script type="text/javascript" src="/assets/js/vis-network.min.js"></script>
<div id="mynetwork" style="height:400px"></div>
<script type="text/javascript">
    // create an array with nodes
    var nodes = new vis.DataSet([
        {% for note in site.notes %}
        { id: "{{note.id}}", label: "{{note.title}}", group: "{{note.categories[1]}}" }
        {% unless forloop.last %}
            ,
        {% endunless %}
        {% endfor %}
    ]);

    // create an array with edges
    var edges = new vis.DataSet([
        {% for note in site.notes %}
            {% for backlink in note.backlinks %}
                { from: "/notes/{{backlink}}", to: "{{note.id}}", arrows: "to" }
                {% unless forloop.last %}
                    ,
                {% endunless %}
            {% endfor %}
            {% if note.backlinks.size > 0 %}
                {% unless forloop.last %}
                    ,
                {% endunless %}
            {% endif %}
        {% endfor %}
    ]);

    // create a network
    var container = document.getElementById("mynetwork");
    var data = {
        nodes: nodes,
        edges: edges,
    };
    var options = {
        nodes: {
          shape: "dot",
          size: 10,
        },
    };
    var network = new vis.Network(container, data, options);
    network.on("click", function (params) {
        params.event = "[original event]";
        document.getElementById("eventSpanHeading").innerText = "Click event:";
        document.getElementById("eventSpanContent").innerText = JSON.stringify(
            params,
            null,
            4
        );
        console.log(
            "click event, getNodeAt returns: " +
            this.getNodeAt(params.pointer.DOM)
        );
    });
    network.on("select", function (params) {
        window.location.href = params.nodes[0]
        // console.log("select Event:", params);
    });
</script>

<em>This chart is generated with <a href="https://visjs.org/">VisJS</a> and maps all the notes.</em>
